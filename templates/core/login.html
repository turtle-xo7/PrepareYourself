{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center mx-auto mb-4">
        <span class="text-white text-xl font-bold">P</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">PrepareYourself</h1>
      <p class="text-gray-500 mt-1 text-sm">তোমার account এ login করো</p>
    </div>

    {% if messages %}
    {% for msg in messages %}
    <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
      ⚠️ {{ msg }}
    </div>
    {% endfor %}
    {% endif %}

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
      <form method="post" class="space-y-5">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
          <input type="text" name="username" required autofocus
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="তোমার username">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
          <input type="password" name="password" required
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="••••••••">
        </div>
        <button type="submit"
          class="w-full bg-blue-600 text-white py-3 rounded-xl font-medium hover:bg-blue-700 transition text-sm">
          Login করো
        </button>
      </form>
    </div>

  </div>
</div>
{% endblock %}
