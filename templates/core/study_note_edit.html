{% extends 'base.html' %}
{% block title %}Edit Note{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 py-8">

    <div class="flex items-center gap-4 mb-8">
        <a href="{% url 'study_note_detail' note.pk %}" class="text-gray-400 hover:text-gray-600">← Back</a>
        <h1 class="text-2xl font-bold text-gray-900">Edit Note</h1>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 p-6">
        <form method="post" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                <input type="text" name="title" value="{{ note.title }}" required
                    class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
                    <select name="subject" required
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none">
                        {% for s in subjects %}
                        <option value="{{ s.id }}" {% if s.id == note.subject.id %}selected{% endif %}>{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Class</label>
                    <select name="class_obj" required
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none">
                        {% for c in classes %}
                        <option value="{{ c.id }}" {% if c.id == note.class_obj.id %}selected{% endif %}>{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Chapter</label>
                <input type="text" name="chapter" value="{{ note.chapter }}" required
                    class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Content</label>
                <textarea name="content" id="content" rows="12">{{ note.content }}</textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">PDF File <span class="text-gray-400 text-xs">(optional — নতুন দিলে replace হবে)</span></label>
                {% if note.pdf_file %}
                <p class="text-xs text-green-600 mb-1">✅ PDF আছে</p>
                {% endif %}
                <input type="file" name="pdf_file" accept=".pdf"
                    class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex gap-3">
                <button type="submit"
                    class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-medium hover:bg-blue-700 transition">
                    Save Changes
                </button>
                <a href="{% url 'study_note_detail' note.pk %}"
                    class="bg-gray-100 text-gray-700 px-6 py-2.5 rounded-xl font-medium hover:bg-gray-200 transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tinymce@7/tinymce.min.js" referrerpolicy="origin"></script>
<script>
tinymce.init({
    selector: '#content',
    plugins: 'anchor autolink charmap codesample emoticons image link lists media searchreplace table visualblocks wordcount',
    toolbar: 'undo redo | blocks fontfamily fontsize | bold italic underline strikethrough | link image media table | align lineheight | numlist bullist indent outdent | emoticons charmap | removeformat',
    height: 500,
    promotion: false,
});

document.querySelector('form').addEventListener('submit', function() {
    tinymce.triggerSave();
});
</script>
{% endblock %}
