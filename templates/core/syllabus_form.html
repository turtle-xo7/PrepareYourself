{% extends 'base.html' %}
{% block title %}{{ action }} Syllabus{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 py-8">

    <div class="flex items-center gap-4 mb-8">
        <a href="{% url 'syllabus_list' %}" class="text-gray-400 hover:text-gray-600">← Back</a>
        <h1 class="text-2xl font-bold text-gray-900">{{ action }} Syllabus</h1>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 p-6">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Board</label>
                    <select name="board" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none">
                        {% for b in boards %}
                        <option value="{{ b.id }}" {% if syllabus and b.id == syllabus.board.id %}selected{% endif %}>{{ b.name }}</option>
                        {% endfor %}
                    </select>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Content</label>
                <textarea name="content" id="content" rows="15">{% if syllabus %}{{ syllabus.content }}{% endif %}</textarea>
            </div>
            <div class="flex gap-3">
                <button type="submit"
                    class="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-medium hover:bg-blue-700 transition">
                    Save
                </button>
                <a href="{% url 'syllabus_list' %}"
                    class="bg-gray-100 text-gray-700 px-6 py-2.5 rounded-xl font-medium hover:bg-gray-200 transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.tiny.cloud/1/354evrnrtgc0eukvlznwkwy6e8zz6smtkd8ndjyes1y2x3tp/tinymce/7/tinymce.min.js" referrerpolicy="origin"></script>
<script>
tinymce.init({
    selector: '#content',
    plugins: 'anchor autolink charmap codesample image link lists table visualblocks wordcount',
    toolbar: 'undo redo | blocks fontsize | bold italic underline | strikethrough | link image table | align | numlist bullist indent outdent | removeformat',
    height: 500,
    promotion: false,
    branding: false,
});
</script>
{% endblock %}
