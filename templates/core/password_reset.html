{% extends 'base.html' %}
{% block title %}Password Reset{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl border border-gray-200 p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">🔐 Password Reset</h1>
            <p class="text-gray-500 text-sm mt-2">তোমার registered email দাও — reset link পাঠানো হবে।</p>
        </div>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required
                    placeholder="তোমার email..."
                    class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 text-white py-2.5 rounded-xl font-medium hover:bg-blue-700 transition">
                Reset Link পাঠাও
            </button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-4">
            <a href="{% url 'login' %}" class="text-blue-600 hover:underline">← Login এ ফিরে যাও</a>
        </p>
    </div>
</div>
{% endblock %}
