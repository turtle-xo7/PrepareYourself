<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Prepare Yourself</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl border border-gray-200 p-8 shadow-sm">
      <h1 class="text-2xl font-bold text-gray-900 mb-1">Checkout</h1>
      <p class="text-sm text-gray-500 mb-6">7-day free trial, তারপর auto-billing</p>

      <form method="post" class="space-y-4">
        {% csrf_token %}
        <input type="hidden" name="plan" value="{{ request.user.profile.plan }}">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Card Number</label>
          <input type="text" placeholder="1234 5678 9012 3456" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Expiry</label>
            <input type="text" placeholder="MM/YY" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">CVV</label>
            <input type="text" placeholder="123" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
        </div>

        <div class="bg-gray-50 rounded-xl p-4 mt-4">
          <div class="flex justify-between text-sm mb-1">
            <span class="text-gray-600">Plan</span>
            <span class="font-medium">{{ request.user.profile.plan }}</span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-gray-600">Free trial</span>
            <span class="font-medium text-green-600">7 days</span>
          </div>
        </div>

        <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-xl font-medium hover:opacity-90 transition text-sm">
          Confirm & Start Trial
        </button>
      </form>
    </div>
  </div>
</body>
</html>
