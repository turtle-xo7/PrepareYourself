{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // ---------- Molecule Data ----------
        const molecules = [
            {
                id: 'h2o', name: 'H₂O', subtitle: 'Water',
                atoms: [
                    { symbol: 'O', x: 300, y: 150, color: '#ff4d4d', radius: 24, charge: 'δ-' },
                    { symbol: 'H', x: 230, y: 100, color: '#a0a0a0', radius: 16, charge: 'δ+' },
                    { symbol: 'H', x: 230, y: 200, color: '#a0a0a0', radius: 16, charge: 'δ+' }
                ],
                bonds: [[0,1], [0,2]],
                equation: '2H₂ + O₂ → 2H₂O',
                bondType: 'Covalent (Polar)',
                bondEnergy: '498 kJ/mol (O-H)',
                structureDesc: 'Bent, 104.5°',
                funFact: 'Water is bent because 2 lone pairs on oxygen repel the O-H bonds.'
            },
            {
                id: 'co2', name: 'CO₂', subtitle: 'Carbon Dioxide',
                atoms: [
                    { symbol: 'C', x: 300, y: 150, color: '#505050', radius: 20, charge: '' },
                    { symbol: 'O', x: 220, y: 150, color: '#ff4d4d', radius: 20, charge: 'δ-' },
                    { symbol: 'O', x: 380, y: 150, color: '#ff4d4d', radius: 20, charge: 'δ-' }
                ],
                bonds: [[0,1], [0,2]],
                equation: 'C + O₂ → CO₂',
                bondType: 'Covalent (Double)',
                bondEnergy: '799 kJ/mol (C=O)',
                structureDesc: 'Linear, 180°',
                funFact: 'CO₂ is a linear molecule with two double bonds.'
            },
            // ... (বাকি মলিকিউলগুলো আগের মতোই থাকবে)
        ];

        const canvas = document.getElementById('moleculeCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = 600;
        canvas.height = 300;

        let currentMolecule = molecules[0];
        let originalAtoms = JSON.parse(JSON.stringify(currentMolecule.atoms));
        let currentAtoms = JSON.parse(JSON.stringify(originalAtoms));
        let bonds = currentMolecule.bonds;
        let isBroken = false;

        const equationEl = document.getElementById('equationDisplay');
        const bondTypeEl = document.getElementById('bondTypeDisplay');
        const bondEnergyEl = document.getElementById('bondEnergyDisplay');
        const structureEl = document.getElementById('structureDescDisplay');
        const funFactEl = document.getElementById('funFactDisplay');
        const moleculeListDiv = document.getElementById('moleculeList');

        function renderMoleculeList() {
            moleculeListDiv.innerHTML = '';
            molecules.forEach(mol => {
                const card = document.createElement('div');
                card.className = `p-3 rounded-xl border border-gray-200 cursor-pointer hover:shadow-md transition molecule-card ${mol.id === currentMolecule.id ? 'selected' : ''}`;
                card.innerHTML = `<div class="font-bold">${mol.name}</div><div class="text-xs text-gray-500">${mol.subtitle}</div>`;
                card.addEventListener('click', () => selectMolecule(mol));
                moleculeListDiv.appendChild(card);
            });
        }

        function selectMolecule(mol) {
            currentMolecule = mol;
            originalAtoms = JSON.parse(JSON.stringify(mol.atoms));
            currentAtoms = JSON.parse(JSON.stringify(originalAtoms));
            bonds = mol.bonds;
            isBroken = false;
            updateInfoPanel();
            drawMolecule();
            renderMoleculeList();
        }

        function updateInfoPanel() {
            equationEl.textContent = currentMolecule.equation;
            bondTypeEl.textContent = currentMolecule.bondType;
            bondEnergyEl.textContent = currentMolecule.bondEnergy;
            structureEl.textContent = currentMolecule.structureDesc;
            funFactEl.textContent = currentMolecule.funFact;
        }

        function drawMolecule() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw bonds
            bonds.forEach(bondIdx => {
                const from = currentAtoms[bondIdx[0]];
                const to = currentAtoms[bondIdx[1]];
                ctx.beginPath();
                ctx.moveTo(from.x, from.y);
                ctx.lineTo(to.x, to.y);
                if (isBroken) {
                    ctx.setLineDash([6, 6]);
                    ctx.strokeStyle = '#aaaaaa';
                    ctx.lineWidth = 2;
                } else {
                    ctx.setLineDash([]);
                    ctx.strokeStyle = '#666';
                    ctx.lineWidth = 4;
                }
                ctx.stroke();
            });
            ctx.setLineDash([]);

            // Draw atoms and charges
            currentAtoms.forEach(atom => {
                ctx.beginPath();
                ctx.arc(atom.x, atom.y, atom.radius, 0, 2 * Math.PI);
                ctx.fillStyle = atom.color;
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = 'white';
                ctx.font = `bold ${atom.radius * 0.7}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(atom.symbol, atom.x, atom.y);

                if (atom.charge) {
                    ctx.font = `bold ${atom.radius * 0.5}px Arial`;
                    ctx.fillStyle = '#1e293b';
                    ctx.fillText(atom.charge, atom.x + atom.radius*0.7, atom.y - atom.radius*0.7);
                }
            });
        }

        // সরাসরি পজিশন পরিবর্তন (অ্যানিমেশন ছাড়া)
        function breakBonds() {
            if (isBroken) return;
            isBroken = true;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            currentAtoms.forEach(atom => {
                const dx = atom.x - centerX;
                const dy = atom.y - centerY;
                const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                atom.x += (dx / dist) * 60 + (Math.random() - 0.5) * 30;
                atom.y += (dy / dist) * 60 + (Math.random() - 0.5) * 30;
            });
            drawMolecule();
        }

        function formBonds() {
            if (!isBroken) return;
            isBroken = false;
            currentAtoms = JSON.parse(JSON.stringify(originalAtoms));
            drawMolecule();
        }

        // Event listeners
        document.getElementById('breakBtn').addEventListener('click', breakBonds);
        document.getElementById('formBtn').addEventListener('click', formBonds);

        // Tabs
        const tabMolecular = document.getElementById('tab-molecular');
        const tabVideos = document.getElementById('tab-videos');
        const sectionMolecular = document.getElementById('molecular-lab-section');
        const sectionVideos = document.getElementById('video-tutorials-section');

        tabMolecular.addEventListener('click', () => {
            tabMolecular.classList.remove('tab-inactive'); tabMolecular.classList.add('tab-active');
            tabVideos.classList.remove('tab-active'); tabVideos.classList.add('tab-inactive');
            sectionMolecular.classList.remove('hidden');
            sectionVideos.classList.add('hidden');
            setTimeout(drawMolecule, 20);
        });

        tabVideos.addEventListener('click', () => {
            tabVideos.classList.remove('tab-inactive'); tabVideos.classList.add('tab-active');
            tabMolecular.classList.remove('tab-active'); tabMolecular.classList.add('tab-inactive');
            sectionVideos.classList.remove('hidden');
            sectionMolecular.classList.add('hidden');
        });

        // Initialize
        renderMoleculeList();
        updateInfoPanel();
        drawMolecule();
    });
</script>
{% endblock %}
