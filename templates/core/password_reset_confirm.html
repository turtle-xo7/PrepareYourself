{% extends 'base.html' %}
{% block title %}New Password{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white rounded-2xl border border-gray-200 p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">🔑 New Password</h1>
            <p class="text-gray-500 text-sm mt-2">নতুন password দাও।</p>
        </div>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                <input type="password" name="new_password1" required
                    class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <input type="password" name="new_password2" required
                    class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            {% if form.errors %}
            <p class="text-red-500 text-sm">{{ form.errors }}</p>
            {% endif %}
            <button type="submit"
                class="w-full bg-blue-600 text-white py-2.5 rounded-xl font-medium hover:bg-blue-700 transition">
                Password Change করো
            </button>
        </form>
    </div>
</div>
{% endblock %}
