<h2>Register</h2>

<form method="POST">
  {% csrf_token %}
  <input name="username" placeholder="username"><br>
  <input name="password" type="password" placeholder="password"><br>
  <button type="submit">Register</button>
</form>

{% if error %}
<p>{{ error }}</p>
{% endif %}

<a href="/login/">Go to Login</a>
