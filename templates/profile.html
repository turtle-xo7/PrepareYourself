<h2>Student Profile</h2>

<form method="POST">
  {% csrf_token %}

  <p>Username: {{ request.user.username }}</p>

  <textarea name="bio" placeholder="Your bio">{{ profile.bio }}</textarea><br>
  <input name="phone" value="{{ profile.phone }}" placeholder="Phone"><br>

  <button type="submit">Update</button>
</form>
