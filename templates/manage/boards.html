{% extends 'base.html' %}
{% block title %}Manage Boards{% endblock %}
{% block content %}

<div class="min-h-screen bg-gray-50">
  <div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="{% url 'manage_dashboard' %}" class="text-gray-400 hover:text-gray-600 text-sm">← Dashboard</a>
      <span class="text-gray-300">/</span>
      <span class="text-sm font-medium text-gray-700">Boards</span>
    </div>
  </div>

  <div class="max-w-3xl mx-auto px-6 py-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Boards</h1>

    {% if messages %}{% for msg in messages %}
    <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-4 text-sm">✅ {{ msg }}</div>
    {% endfor %}{% endif %}

    <form method="post" action="{% url 'board_add' %}" class="bg-white rounded-xl border border-gray-200 p-5 mb-6">
      {% csrf_token %}
      <p class="text-sm font-medium text-gray-700 mb-3">নতুন Board যোগ করো</p>
      <div class="flex gap-3">
        <input type="text" name="name" placeholder="Board name (e.g. Dhaka)" required
          class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <input type="text" name="student_count" placeholder="e.g. 5M+"
          class="w-28 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700">Add</button>
      </div>
    </form>

    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 border-b border-gray-200">
          <tr>
            <th class="text-left px-4 py-3 text-gray-500 font-medium">Name</th>
            <th class="text-left px-4 py-3 text-gray-500 font-medium">Students</th>
            <th class="text-left px-4 py-3 text-gray-500 font-medium">Status</th>
            <th class="text-left
